<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 32px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .input-row button:active {
      transform: scale(0.95);
    }

    .stats {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .stats strong {
      color: #6c63ff;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked {
      opacity: 0.5;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #222;
      word-break: break-word;
      transition: text-decoration 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #ccc;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e74c3c;
      background: #ffeaea;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 48px 0;
      font-size: 15px;
    }

    .empty .empty-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .actions button {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .actions button:hover {
      border-color: #aaa;
      color: #444;
    }

    .actions button.danger:hover {
      border-color: #e74c3c;
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="80">
      <button id="addBtn" title="추가">+</button>
    </div>

    <p class="stats" id="stats"></p>

    <ul class="list" id="list"></ul>

    <div class="actions" id="actions" style="display:none">
      <button class="danger" id="clearCheckedBtn">완료 항목 삭제</button>
      <button class="danger" id="clearAllBtn">전체 삭제</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'shopping_list';
    let items = load();

    const input   = document.getElementById('itemInput');
    const addBtn  = document.getElementById('addBtn');
    const listEl  = document.getElementById('list');
    const statsEl = document.getElementById('stats');
    const actionsEl       = document.getElementById('actions');
    const clearCheckedBtn = document.getElementById('clearCheckedBtn');
    const clearAllBtn     = document.getElementById('clearAllBtn');

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = '';

      if (items.length === 0) {
        listEl.innerHTML = `<li class="empty"><span class="empty-icon">📋</span>아이템을 추가해 보세요!</li>`;
        actionsEl.style.display = 'none';
        statsEl.textContent = '';
        return;
      }

      const checkedCount = items.filter(i => i.checked).length;
      statsEl.innerHTML = `총 <strong>${items.length}</strong>개 · 완료 <strong>${checkedCount}</strong>개`;
      actionsEl.style.display = 'flex';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'item' + (item.checked ? ' checked' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggle(idx));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.addEventListener('click', () => remove(idx));

        li.append(cb, span, del);
        listEl.appendChild(li);
      });
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    clearCheckedBtn.addEventListener('click', () => {
      if (!items.some(i => i.checked)) return;
      if (confirm('완료된 항목을 모두 삭제할까요?')) {
        items = items.filter(i => !i.checked);
        save(); render();
      }
    });

    clearAllBtn.addEventListener('click', () => {
      if (confirm('전체 목록을 삭제할까요?')) {
        items = [];
        save(); render();
      }
    });

    render();
  </script>
</body>
</html>
